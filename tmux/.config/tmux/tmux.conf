set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
set -g mouse on
set -s escape-time 10
setw -g pane-base-index 1
setw -g mode-keys vi

# Touchpads can generate many wheel events; scroll one line on every fourth event.
set -g @touchpad-scroll-step 0
bind-key -T root WheelUpPane copy-mode -e \; if-shell -F '#{==:#{@touchpad-scroll-step},3}' 'set -g @touchpad-scroll-step 0; send-keys -X scroll-up' 'if-shell -F "#{==:#{@touchpad-scroll-step},2}" "set -g @touchpad-scroll-step 3" "if-shell -F \"#{==:#{@touchpad-scroll-step},1}\" \"set -g @touchpad-scroll-step 2\" \"set -g @touchpad-scroll-step 1\""'
bind-key -T root WheelDownPane if-shell -F '#{pane_in_mode}' 'if-shell -F "#{==:#{@touchpad-scroll-step},3}" "set -g @touchpad-scroll-step 0; send-keys -X scroll-down" "if-shell -F \"#{==:#{@touchpad-scroll-step},2}\" \"set -g @touchpad-scroll-step 3\" \"if-shell -F \\\"#{==:#{@touchpad-scroll-step},1}\\\" \\\"set -g @touchpad-scroll-step 2\\\" \\\"set -g @touchpad-scroll-step 1\\\"\""' 'send-keys -M'
bind-key -T copy-mode-vi WheelUpPane if-shell -F '#{==:#{@touchpad-scroll-step},3}' 'set -g @touchpad-scroll-step 0; send-keys -X scroll-up' 'if-shell -F "#{==:#{@touchpad-scroll-step},2}" "set -g @touchpad-scroll-step 3" "if-shell -F \"#{==:#{@touchpad-scroll-step},1}\" \"set -g @touchpad-scroll-step 2\" \"set -g @touchpad-scroll-step 1\""'
bind-key -T copy-mode-vi WheelDownPane if-shell -F '#{==:#{@touchpad-scroll-step},3}' 'set -g @touchpad-scroll-step 0; send-keys -X scroll-down' 'if-shell -F "#{==:#{@touchpad-scroll-step},2}" "set -g @touchpad-scroll-step 3" "if-shell -F \"#{==:#{@touchpad-scroll-step},1}\" \"set -g @touchpad-scroll-step 2\" \"set -g @touchpad-scroll-step 1\""'
bind-key -T copy-mode WheelUpPane if-shell -F '#{==:#{@touchpad-scroll-step},3}' 'set -g @touchpad-scroll-step 0; send-keys -X scroll-up' 'if-shell -F "#{==:#{@touchpad-scroll-step},2}" "set -g @touchpad-scroll-step 3" "if-shell -F \"#{==:#{@touchpad-scroll-step},1}\" \"set -g @touchpad-scroll-step 2\" \"set -g @touchpad-scroll-step 1\""'
bind-key -T copy-mode WheelDownPane if-shell -F '#{==:#{@touchpad-scroll-step},3}' 'set -g @touchpad-scroll-step 0; send-keys -X scroll-down' 'if-shell -F "#{==:#{@touchpad-scroll-step},2}" "set -g @touchpad-scroll-step 3" "if-shell -F \"#{==:#{@touchpad-scroll-step},1}\" \"set -g @touchpad-scroll-step 2\" \"set -g @touchpad-scroll-step 1\""'

if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'

set -as terminal-features ',alacritty*:RGB'
set -as terminal-features ',alacritty*:clipboard'
set -as terminal-features ',ghostty*:RGB'
set -as terminal-features ',ghostty*:clipboard'
set -as terminal-features ',xterm*:clipboard'

if-shell 'tmux -V | grep -Eq "tmux (2\\.[6-9]|[3-9]\\.)"' \
  'set -s set-clipboard external' \
  'set -s set-clipboard on'

# Mouse and vi copy-mode selections go to the Wayland clipboard.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'

# tmux plugin manager.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# fzf-powered tmux navigation.
bind-key s if-shell 'command -v tmux-fzf-session-switch >/dev/null 2>&1' \
  'run-shell "tmux-fzf-session-switch"' \
  'display-message "tmux-fzf-session-switch not installed"'

bind-key w if-shell 'command -v tmux-fzf-window-switch >/dev/null 2>&1' \
  'run-shell "tmux-fzf-window-switch"' \
  'display-message "tmux-fzf-window-switch not installed"'

bind-key p if-shell 'command -v tmux-fzf-pane-switch >/dev/null 2>&1' \
  'run-shell "tmux-fzf-pane-switch"' \
  'display-message "tmux-fzf-pane-switch not installed"'

bind-key b if-shell 'command -v fzf >/dev/null 2>&1 && command -v fzf-tmux >/dev/null 2>&1' \
  'run-shell "choice=$(tmux list-buffers -F \"##{buffer_name}: ##{buffer_size} bytes\" | fzf-tmux -p 80%,60% || true); buffer=$(printf \"%s\n\" \"$choice\" | awk -F: \"{print \\$1}\"); if [ -n \"$buffer\" ]; then tmux paste-buffer -b \"$buffer\"; fi"' \
  'display-message "fzf not installed (need fzf + fzf-tmux)"'

bind-key f if-shell 'command -v tmux-sessionizer >/dev/null 2>&1' \
  'run-shell "tmux-sessionizer"' \
  'display-message "tmux-sessionizer not installed"'

if-shell 'test -x ~/.tmux/plugins/tpm/tpm' 'run-shell ~/.tmux/plugins/tpm/tpm'
