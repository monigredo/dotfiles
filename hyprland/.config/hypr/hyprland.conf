$mod = SUPER
$term = alacritty --config-file ~/.config/alacritty-hypr/alacritty.toml
$term_tmux = alacritty --config-file ~/.config/alacritty-hypr/alacritty.toml -e tmux new-session -A -s main
$menu = rofi -show drun

monitor = , preferred, auto, auto

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = DESKTOP_SESSION,Hyprland

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    layout = dwindle
    resize_on_border = false
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 10
    rounding_power = 2

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    preserve_split = true
}

input {
    kb_layout = us,ua
    kb_options = ctrl:nocaps
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 0.3
    }
}

gesture = 3, horizontal, workspace

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = -1
}

bind = $mod, RETURN, exec, $term_tmux
bind = $mod SHIFT, RETURN, exec, $term
bind = $mod, SPACE, exec, $menu
bind = $mod, Q, killactive

bind = CTRL, SPACE, exec, hyprctl switchxkblayout current next

bind = $mod, LEFT, movefocus, l
bind = $mod, DOWN, movefocus, d
bind = $mod, UP, movefocus, u
bind = $mod, RIGHT, movefocus, r

bind = $mod SHIFT, LEFT, movewindow, l
bind = $mod SHIFT, DOWN, movewindow, d
bind = $mod SHIFT, UP, movewindow, u
bind = $mod SHIFT, RIGHT, movewindow, r

bind = CTRL $mod, LEFT, resizeactive, -60 0
bind = CTRL $mod, RIGHT, resizeactive, 60 0
bind = CTRL $mod, UP, resizeactive, 0 -60
bind = CTRL $mod, DOWN, resizeactive, 0 60

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = CTRL $mod SHIFT, 1, movetoworkspace, 1
bind = CTRL $mod SHIFT, 2, movetoworkspace, 2
bind = CTRL $mod SHIFT, 3, movetoworkspace, 3
bind = CTRL $mod SHIFT, 4, movetoworkspace, 4
bind = CTRL $mod SHIFT, 5, movetoworkspace, 5
bind = CTRL $mod SHIFT, 6, movetoworkspace, 6
bind = CTRL $mod SHIFT, 7, movetoworkspace, 7
bind = CTRL $mod SHIFT, 8, movetoworkspace, 8
bind = CTRL $mod SHIFT, 9, movetoworkspace, 9

bind = CTRL, LEFT, workspace, -1
bind = CTRL, RIGHT, workspace, +1

bind = $mod, N, exec, ~/.local/bin/hypr-move-workspace-next-output

binde = $mod, F1, exec, brightnessctl set 5%-
binde = $mod, F2, exec, brightnessctl set +5%
binde = $mod, F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = $mod, F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = $mod SHIFT, F12, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind = $mod, F8, exec, playerctl play-pause
bind = $mod, F9, exec, playerctl previous
bind = $mod, F10, exec, playerctl next

bind = $mod SHIFT, 4, exec, sh -c 'grim -g "$(slurp)" - | wl-copy'
bind = $mod SHIFT, B, exec, ~/.local/bin/rofi-bluetooth
bind = $mod SHIFT, N, exec, ~/.local/bin/wifi-menu
bind = CTRL $mod, N, exec, nm-connection-editor
bind = CTRL $mod, Q, exec, pidof hyprlock >/dev/null || hyprlock

bindl = , switch:on:Lid Switch, exec, ~/.local/bin/hypr-handle-lid.sh
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, auto"

bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, E, exit

exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP DESKTOP_SESSION HYPRLAND_INSTANCE_SIGNATURE
exec-once = mako
exec-once = /usr/libexec/lxqt-policykit-agent
exec-once = sh -c 'pkill waybar 2>/dev/null; waybar -c ~/.config/waybar-hypr/config -s ~/.config/waybar-hypr/style.css'
exec-once = hypridle
